<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生图 - 即梦风格工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0a12; color: #e8e8f0; font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        /* 顶部栏 */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(16,16,28,0.95);
            border-bottom: 1px solid #252540;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            backdrop-filter: blur(12px);
        }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .back-btn {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: #1a1a2e;
            border: 1px solid #2a2a45;
            color: #a0a0c0;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn:hover { background: #252542; color: #fff; border-color: #3a3a5a; }
        .topbar-title { font-size: 15px; font-weight: 600; color: #fff; }
        .topbar-sub { font-size: 12px; color: #6c7a99; margin-left: 8px; }
        .canvas-tools { display: flex; gap: 8px; align-items: center; }
        .canvas-tool-btn {
            padding: 6px 12px;
            background: #1a1a2e;
            border: 1px solid #2a2a45;
            border-radius: 8px;
            color: #a0a0c0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .canvas-tool-btn:hover { background: #252542; color: #fff; }
        .canvas-tool-btn.active { background: rgba(15,184,106,0.15); border-color: rgba(15,184,106,0.4); color: #0FB86A; }

        /* 主布局 */
        .main { position: fixed; top: 56px; left: 0; right: 360px; bottom: 0; }

        /* 无限画布 */
        .infinite-canvas {
            width: 100%; height: 100%;
            overflow: hidden;
            cursor: grab;
            background: #0a0a12;
            position: relative;
        }
        .infinite-canvas:active { cursor: grabbing; }
        .infinite-canvas::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            transform: translate(0, 0) scale(1);
            transform-origin: 0 0;
        }
        .canvas-world {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }
        .canvas-world.is-dragging { transition: none; }

        .empty-hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            color: #4a4a6a;
        }
        .empty-hint svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
        .empty-hint h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: #6c7a99; }
        .empty-hint p { font-size: 13px; }

        /* 生成的图片节点 */
        .gen-image-node {
            position: absolute;
            width: 512px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background: #13132b;
            border: 1px solid #2a2a45;
            transform: translate(-50%, -50%);
            cursor: grab;
            user-select: none;
        }
        .gen-image-node:active { cursor: grabbing; }
        .gen-image-node img { width: 100%; height: auto; display: block; }
        .node-actions {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 10px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex; gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .gen-image-node:hover .node-actions { opacity: 1; }
        .node-action-btn {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s;
        }
        .node-action-btn.use { background: #0FB86A; color: #fff; }
        .node-action-btn.use:hover { background: #11d17a; }
        .node-action-btn.del { background: rgba(255,107,107,0.15); color: #ff6b6b; margin-left: auto; }
        .node-action-btn.del:hover { background: rgba(255,107,107,0.25); }

        /* 右侧交流面板 */
        .chat-panel {
            position: fixed;
            top: 56px; right: 0; bottom: 0;
            width: 360px;
            background: #16162b;
            border-left: 1px solid #252540;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        .chat-header {
            padding: 16px 18px;
            border-bottom: 1px solid #252540;
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
        .chat-header span { font-size: 12px; color: #0FB86A; }
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .chat-history::-webkit-scrollbar { width: 5px; }
        .chat-history::-webkit-scrollbar-thumb { background: #2a2a45; border-radius: 3px; }
        .chat-message { display: flex; gap: 10px; }
        .chat-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #1a1a30;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            border: 1px solid #2a2a45;
        }
        .chat-avatar.user { background: #6C8FFF; color: #fff; border-color: #6C8FFF; }
        .chat-content { flex: 1; }
        .chat-bubble {
            background: #1a1a30;
            border: 1px solid #2a2a45;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.6;
            color: #d8dce4;
        }
        .chat-message.user .chat-bubble { background: rgba(108,143,255,0.12); border-color: rgba(108,143,255,0.25); }
        .chat-time { font-size: 11px; color: #5a5a7a; margin-top: 4px; }
        .chat-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 8px;
            border: 1px solid #2a2a45;
            cursor: pointer;
        }

        /* 输入区 */
        .chat-input-area {
            border-top: 1px solid #252540;
            padding: 14px;
            background: #13132b;
        }
        .input-tabs {
            display: flex; gap: 6px; margin-bottom: 10px;
        }
        .input-tab {
            flex: 1;
            padding: 7px 0;
            background: #1a1a30;
            border: 1px solid #2a2a45;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .input-tab.active { background: rgba(15,184,106,0.12); border-color: rgba(15,184,106,0.35); color: #0FB86A; }
        .input-field { margin-bottom: 10px; }
        .input-field label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        .input-field textarea {
            width: 100%;
            min-height: 70px;
            background: #1a1a30;
            border: 1px solid #2a2a45;
            border-radius: 10px;
            padding: 10px;
            color: #d8dce4;
            font-size: 13px;
            resize: vertical;
            outline: none;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .input-field textarea:focus { border-color: #0FB86A; }
        .input-field textarea::placeholder { color: #5a5a7a; }
        .input-field textarea.small { min-height: 44px; }
        .negative-label { color: #ff8a8a !important; }

        .generate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0FB86A, #22B563);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s;
        }
        .generate-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(15,184,106,0.35); }
        .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-bar {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
        .status-bar.active { display: flex; }

        /* 生成中的占位 */
        .generating-placeholder {
            width: 512px;
            height: 512px;
            border-radius: 16px;
            background: #13132b;
            border: 1px dashed #2a2a45;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #6c7a99;
            transform: translate(-50%, -50%);
        }
        .generating-placeholder .spinner { border-color: rgba(15,184,106,0.3); border-top-color: #0FB86A; }
        button, input, textarea, select { font-family: inherit; }
        button { min-height: 36px; font-weight: 600; letter-spacing: .01em; }
        input, textarea, select { font-size: 14px; line-height: 1.5; }
        .api-config { margin: 12px 14px 0; padding: 12px; border: 1px solid #2a2a45; border-radius: 12px; background: #13132b; }
        .api-config summary { cursor: pointer; font-size: 13px; font-weight: 600; color: #d8dce4; }
        .api-config-note { margin: 8px 0 10px; font-size: 11px; line-height: 1.5; color: #6c7a99; }
        .api-grid { display: grid; gap: 9px; }
        .api-field label { display: block; margin-bottom: 5px; font-size: 11px; color: #888; }
        .api-field input { width: 100%; height: 38px; padding: 0 10px; color: #d8dce4; background: #1a1a30; border: 1px solid #2a2a45; border-radius: 8px; outline: none; }
        .api-field input:focus { border-color: #0FB86A; box-shadow: 0 0 0 3px rgba(15,184,106,.1); }
        .api-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .api-test-btn { padding: 0 12px; border: 1px solid rgba(15,184,106,.4); border-radius: 8px; color: #0FB86A; background: rgba(15,184,106,.1); cursor: pointer; }
        .api-state { font-size: 11px; color: #6c7a99; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <button class="back-btn" onclick="window.location.href='tool.html'" title="返回封面编辑器">←</button>
            <span class="topbar-title">AI 生图工作台</span>
            <span class="topbar-sub">GPT-Image 模型 · 无限画布</span>
        </div>
        <div class="canvas-tools">
            <button class="canvas-tool-btn" id="tool-hand" onclick="setTool('hand')" title="平移画布">🖐 手型</button>
            <button class="canvas-tool-btn" id="tool-select" onclick="setTool('select')" title="选择/移动图片">↖ 选择</button>
            <button class="canvas-tool-btn" onclick="resetCanvas()">⟲ 重置视图</button>
        </div>
    </div>

    <div class="main">
        <div class="infinite-canvas" id="infinite-canvas">
            <div class="canvas-world" id="canvas-world">
                <div class="empty-hint" id="empty-hint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="4"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <h3>无限画布</h3>
                    <p>在右侧输入描述，生成图片后将显示在这里</p>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="chat-header">
            <h3>💬 生图交流</h3>
            <span id="connection-badge">待配置</span>
        </div>
        <details class="api-config" open>
            <summary>临时 API 连接设置</summary>
            <p class="api-config-note">仅保存在当前浏览器标签页，刷新或关闭后会清除。请勿在公共电脑上使用正式密钥。</p>
            <div class="api-grid">
                <div class="api-field"><label for="api-base">API 地址</label><input id="api-base" type="url" placeholder="https://example.com/v1" autocomplete="off"></div>
                <div class="api-field"><label for="api-key">API 密钥</label><input id="api-key" type="password" placeholder="sk-..." autocomplete="off"></div>
                <div class="api-field"><label for="api-model">模型</label><input id="api-model" type="text" value="gpt-image-2" autocomplete="off"></div>
            </div>
            <div class="api-actions"><button class="api-test-btn" type="button" onclick="validateApiConfig()">检查配置</button><span class="api-state" id="api-state">尚未配置</span></div>
        </details>
        <div class="chat-history" id="chat-history"></div>
        <div class="chat-input-area">
            <div class="input-tabs">
                <div class="input-tab active" data-tab="prompt" onclick="switchInputTab(this)">配图描述</div>
                <div class="input-tab" data-tab="style" onclick="switchInputTab(this)">风格</div>
                <div class="input-tab" data-tab="negative" onclick="switchInputTab(this)">反向</div>
            </div>
            <div class="input-field" id="field-prompt">
                <label>配图描述</label>
                <textarea id="inp-prompt" placeholder="请帮我生成一张合同审查场景下的配图，黑底背景，高级苹果风格 SaaS 插图..."></textarea>
            </div>
            <div class="input-field" id="field-style" style="display:none;">
                <label>风格提示词（可选）</label>
                <textarea id="inp-style" class="small" placeholder="清新商务扁平插画，浅薄荷绿渐变背景..."></textarea>
            </div>
            <div class="input-field" id="field-negative" style="display:none;">
                <label class="negative-label">反向提示词（可选）</label>
                <textarea id="inp-negative" class="small" placeholder="模糊，低质量，水印，文字，变形..."></textarea>
            </div>
            <button class="generate-btn" id="generate-btn" onclick="generateImage()">
                <span>🎨</span> 一键生成配图
            </button>
            <div class="status-bar" id="status-bar">
                <div class="spinner"></div>
                <span id="status-text">正在生成...</span>
            </div>
        </div>
    </div>

    <script>
        // ===== 无限画布状态 =====
        let canvasState = { x: 0, y: 0, scale: 1 };
        let isDraggingCanvas = false;
        let dragStart = { x: 0, y: 0 };
        let currentTool = 'hand';
        let nodeCounter = 0;
        let draggedNode = null;
        let nodeDragOffset = { x: 0, y: 0 };
        const world = document.getElementById('canvas-world');
        const canvas = document.getElementById('infinite-canvas');
        const referencePresets = [
            { id: 'sample-light-1', name: '清新卡片', url: 'assets/sample-light-1.png' },
            { id: 'sample-light-2', name: '数据面板', url: 'assets/sample-light-2.png' },
            { id: 'sample-light-3', name: '流程管理', url: 'assets/sample-light-3.png' },
            { id: 'sample-light-4', name: 'AI 助手', url: 'assets/sample-light-4.png' }
        ];
        let selectedReferenceIds = new Set();
        let latestGeneratedImage = '';

        function getApiConfig() {
            return {
                base: document.getElementById('api-base').value.trim().replace(/\/+$/, ''),
                key: document.getElementById('api-key').value.trim(),
                model: document.getElementById('api-model').value.trim()
            };
        }

        function validateApiConfig() {
            const config = getApiConfig();
            const state = document.getElementById('api-state');
            const badge = document.getElementById('connection-badge');
            if (!config.base || !config.key || !config.model) {
                state.textContent = '请完整填写三项配置';
                badge.textContent = '待配置';
                return false;
            }
            try { new URL(config.base); } catch (_) {
                state.textContent = 'API 地址格式不正确';
                badge.textContent = '待配置';
                return false;
            }
            state.textContent = '配置完整，可尝试生图';
            badge.textContent = '已配置';
            sessionStorage.setItem('cover-tool-api-config', JSON.stringify(config));
            return true;
        }

        (function restoreApiConfig() {
            try {
                const saved = JSON.parse(sessionStorage.getItem('cover-tool-api-config') || '{}');
                if (saved.base) document.getElementById('api-base').value = saved.base;
                if (saved.key) document.getElementById('api-key').value = saved.key;
                if (saved.model) document.getElementById('api-model').value = saved.model;
                if (saved.base && saved.key && saved.model) validateApiConfig();
            } catch (_) {}
        })();

        function getMaterialLibrary() {
            try { return JSON.parse(localStorage.getItem('ai-image-material-library') || '[]'); }
            catch (_) { return []; }
        }

        function renderReferences() {
            const list = document.getElementById('reference-list');
            if (!list) return;
            const materials = getMaterialLibrary().map((url, index) => ({ id: `material-${index}`, name: '我的素材', url }));
            const items = [...referencePresets, ...materials];
            list.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'reference-card' + (selectedReferenceIds.has(item.id) ? ' selected' : '');
                card.title = item.name;
                const image = document.createElement('img');
                image.src = item.url;
                image.alt = item.name;
                const check = document.createElement('span');
                check.className = 'reference-check';
                check.textContent = '✓';
                card.append(image, check);
                card.onclick = () => {
                    selectedReferenceIds.has(item.id) ? selectedReferenceIds.delete(item.id) : selectedReferenceIds.add(item.id);
                    renderReferences();
                };
                list.appendChild(card);
            });
        }

        async function imageUrlToDataUrl(url) {
            if (url.startsWith('data:')) return url;
            const response = await fetch(url);
            if (!response.ok) throw new Error('参考图读取失败');
            const blob = await response.blob();
            return await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function selectedReferenceImages() {
            const materials = getMaterialLibrary().map((url, index) => ({ id: `material-${index}`, url }));
            const selected = [...referencePresets, ...materials].filter(item => selectedReferenceIds.has(item.id));
            return await Promise.all(selected.map(item => imageUrlToDataUrl(item.url)));
        }

        function saveToLibrary() {
            if (!latestGeneratedImage) return;
            const library = getMaterialLibrary();
            if (!library.includes(latestGeneratedImage)) {
                library.unshift(latestGeneratedImage);
                localStorage.setItem('ai-image-material-library', JSON.stringify(library.slice(0, 24)));
            }
            renderReferences();
            const button = document.getElementById('save-library-btn');
            button.textContent = '✓ 已添加至素材库';
            button.disabled = true;
            addMessage('ai', '已添加到素材库，下次打开时可直接作为参考图选择。');
        }

        renderReferences();

        function updateCanvasTransform() {
            world.style.transform = `translate(calc(-50% + ${canvasState.x}px), calc(-50% + ${canvasState.y}px)) scale(${canvasState.scale})`;
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.canvas-tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-' + tool).classList.add('active');
            canvas.style.cursor = tool === 'hand' ? 'grab' : 'default';
        }
        setTool('hand');

        function resetCanvas() {
            canvasState = { x: 0, y: 0, scale: 1 };
            updateCanvasTransform();
        }

        // 画布拖拽平移
        canvas.addEventListener('mousedown', e => {
            if (e.target.closest('.gen-image-node')) return;
            if (currentTool !== 'hand') return;
            isDraggingCanvas = true;
            dragStart = { x: e.clientX, y: e.clientY };
            world.classList.add('is-dragging');
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', e => {
            if (isDraggingCanvas) {
                const dx = (e.clientX - dragStart.x) / canvasState.scale;
                const dy = (e.clientY - dragStart.y) / canvasState.scale;
                canvasState.x += dx;
                canvasState.y += dy;
                dragStart = { x: e.clientX, y: e.clientY };
                updateCanvasTransform();
            }
            if (draggedNode) {
                const rect = canvas.getBoundingClientRect();
                const centerX = rect.width / 2 + canvasState.x;
                const centerY = rect.height / 2 + canvasState.y;
                const worldX = (e.clientX - centerX) / canvasState.scale;
                const worldY = (e.clientY - centerY) / canvasState.scale;
                draggedNode.dataset.x = worldX - nodeDragOffset.x;
                draggedNode.dataset.y = worldY - nodeDragOffset.y;
                updateNodePosition(draggedNode);
            }
        });

        window.addEventListener('mouseup', () => {
            isDraggingCanvas = false;
            draggedNode = null;
            world.classList.remove('is-dragging');
            if (currentTool === 'hand') canvas.style.cursor = 'grab';
        });

        // 滚轮缩放
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            canvasState.scale = Math.max(0.2, Math.min(3, canvasState.scale * delta));
            updateCanvasTransform();
        }, { passive: false });

        // 节点拖拽
        function makeNodeDraggable(node) {
            node.addEventListener('mousedown', e => {
                if (currentTool !== 'select') return;
                e.stopPropagation();
                draggedNode = node;
                const rect = canvas.getBoundingClientRect();
                const centerX = rect.width / 2 + canvasState.x;
                const centerY = rect.height / 2 + canvasState.y;
                const worldX = (e.clientX - centerX) / canvasState.scale;
                const worldY = (e.clientY - centerY) / canvasState.scale;
                nodeDragOffset.x = worldX - parseFloat(node.dataset.x || 0);
                nodeDragOffset.y = worldY - parseFloat(node.dataset.y || 0);
            });
        }

        function updateNodePosition(node) {
            node.style.left = '50%';
            node.style.top = '50%';
            node.style.marginLeft = parseFloat(node.dataset.x || 0) + 'px';
            node.style.marginTop = parseFloat(node.dataset.y || 0) + 'px';
        }

        // 切换输入 tab
        function switchInputTab(tab) {
            document.querySelectorAll('.input-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.input-field').forEach(f => f.style.display = 'none');
            document.getElementById('field-' + tab.dataset.tab).style.display = 'block';
        }

        // 聊天记录
        function addMessage(role, text, imageUrl) {
            const history = document.getElementById('chat-history');
            const wrapper = document.createElement('div');
            wrapper.className = 'chat-message ' + role;
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const avatar = role === 'user' ? '我' : 'AI';
            wrapper.innerHTML = `
                <div class="chat-avatar ${role}">${avatar}</div>
                <div class="chat-content">
                    <div class="chat-bubble">${text}</div>
                    ${imageUrl ? `<img class="chat-image" src="${imageUrl}" onclick="previewImage('${imageUrl}')">` : ''}
                    <div class="chat-time">${time}</div>
                </div>
            `;
            history.appendChild(wrapper);
            history.scrollTop = history.scrollHeight;
        }

        // 生成图片
        async function generateImage() {
            const prompt = document.getElementById('inp-prompt').value.trim();
            const style = document.getElementById('inp-style').value.trim();
            const negative = document.getElementById('inp-negative').value.trim();
            if (!prompt) { alert('请输入配图描述'); return; }
            if (!validateApiConfig()) { alert('请先完整填写 API 地址、API 密钥和模型'); return; }
            const apiConfig = getApiConfig();

            let finalPrompt = prompt;
            if (style) finalPrompt += '\n\n风格要求：' + style;
            if (negative) finalPrompt += '\n\n反向提示词：' + negative;
            finalPrompt += '\n\n请只输出主体配图，背景须为纯亮绿色（#00FF00），不要在主体边缘加入绿色描边。';

            const btn = document.getElementById('generate-btn');
            const statusBar = document.getElementById('status-bar');
            const statusText = document.getElementById('status-text');
            const emptyHint = document.getElementById('empty-hint');
            if (emptyHint) emptyHint.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> 生成中...';
            statusBar.classList.add('active');
            statusText.textContent = '正在连接生图服务...';

            addMessage('user', `生成配图：${prompt}${style ? '（风格：' + style + '）' : ''}`);

            // 先放置生成中占位
            nodeCounter++;
            const placeholder = document.createElement('div');
            placeholder.className = 'generating-placeholder';
            placeholder.id = 'placeholder-' + nodeCounter;
            const posX = (nodeCounter - 1) * 40;
            const posY = (nodeCounter - 1) * 40;
            placeholder.dataset.x = posX;
            placeholder.dataset.y = posY;
            placeholder.innerHTML = '<div class="spinner"></div><span>正在生成...</span>';
            world.appendChild(placeholder);
            updateNodePosition(placeholder);

            try {
                const referenceImages = await selectedReferenceImages();
                if (referenceImages.length) statusText.textContent = '正在结合参考图生成并自动抠图...';
                const response = await fetch(apiConfig.base + '/images/generations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiConfig.key },
                    body: JSON.stringify({ model: apiConfig.model, prompt: finalPrompt, n: 1, size: '1024x1024', background: 'transparent', reference_images: referenceImages })
                });
                const contentType = response.headers.get('content-type') || '';
                if (!contentType.includes('application/json')) {
                    await response.text();
                    throw new Error(response.status === 404 ? 'API 地址或生图路径不正确' : 'API 返回了非 JSON 内容');
                }
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let imageUrl = data.data?.[0]?.b64_json || data.data?.[0]?.url || '';
                if (imageUrl.startsWith('/9j/') || imageUrl.startsWith('iVBOR')) {
                    imageUrl = 'data:image/png;base64,' + imageUrl;
                }
                if (!imageUrl) throw new Error('未获取到图片数据');
                // URL 响应需要允许浏览器跨域读取；优先推荐 API 返回 b64_json。
                if (!imageUrl.startsWith('data:')) {
                    imageUrl = await imageUrlToDataUrl(imageUrl);
                }

                // 绿幕处理
                removeGreenScreen(imageUrl, function(processedUrl) {
                    placeholder.remove();
                    latestGeneratedImage = processedUrl;
                    document.getElementById('save-library-btn').disabled = false;
                    document.getElementById('save-library-btn').textContent = '＋ 添加至素材库';
                    createImageNode(processedUrl, posX, posY);
                    addMessage('ai', '配图已生成，您可以在左侧画布中查看和调整位置。', processedUrl);
                    statusText.textContent = '生成完成';
                    setTimeout(() => statusBar.classList.remove('active'), 1500);
                });
            } catch (err) {
                placeholder.remove();
                addMessage('ai', '生成失败：' + err.message);
                statusText.textContent = '生成失败';
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>🎨</span> 一键生成配图';
            }
        }

        function createImageNode(url, x, y) {
            nodeCounter++;
            const node = document.createElement('div');
            node.className = 'gen-image-node';
            node.dataset.x = x;
            node.dataset.y = y;
            node.innerHTML = `
                <img src="${url}" alt="生成图片">
                <div class="node-actions">
                    <button class="node-action-btn use" onclick="useImage('${url}')">✓ 应用到封面</button>
                    <button class="node-action-btn del" onclick="this.closest('.gen-image-node').remove()">删除</button>
                </div>
            `;
            world.appendChild(node);
            updateNodePosition(node);
            makeNodeDraggable(node);
        }

        // 将图片应用到封面编辑器
        function useImage(url) {
            localStorage.setItem('ai-generated-image', url);
            window.location.href = 'tool.html?useImage=1';
        }

        // 预览图片
        function previewImage(url) {
            const win = window.open('', '_blank');
            win.document.write(`<html><body style="margin:0;background:#0a0a12;display:flex;justify-content:center;align-items:center;"><img src="${url}" style="max-width:100%;max-height:100vh;"></body></html>`);
        }

        // 绿幕去除
        async function removeGreenScreen(src, callback) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                const canvasEl = document.createElement('canvas');
                canvasEl.width = img.width;
                canvasEl.height = img.height;
                const ctx = canvasEl.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const maxOther = Math.max(r, b);
                    if (g > 100 && g - maxOther > 45) {
                        const strength = g - maxOther;
                        data[i+3] = strength >= 105 ? 0 : Math.floor(data[i+3] * Math.max(0, (105 - strength) / 60));
                    }
                }
                ctx.putImageData(imageData, 0, 0);
                callback(canvasEl.toDataURL('image/png'));
            };
            img.onerror = function() { callback(src); };
            img.src = src;
        }

        // 快捷键：Enter 生成
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateImage();
        });
    </script>
</body>
